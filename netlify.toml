[build]
  command = "pnpm run netlify-build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.14.0"
  CI = "false"
  COREPACK_INTEGRITY_KEYS = "0"
  SITE_URL = "https://agendaya.netlify.app"

[functions]
  directory = "netlify/functions"
  # esbuild bundler por defecto
  node_bundler = "esbuild"

# 404 personalizada — devuelve 404 real para crawlers
[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404

# Redirecciones para SPA (catch-all al final)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Seguridad básica
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "same-origin"

[dev]
  port = 3000
  targetPort = 3000
  publish = "dist"
  autoLaunch = "true"