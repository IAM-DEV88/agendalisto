[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.10.0"
  NPM_FLAGS = "--legacy-peer-deps"
  CI = "false"
  SITE_URL = "https://agendalisto.com"

# 404 personalizada
[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 200

# Redirecciones para SPA (catch-all al final)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Seguridad básica
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "same-origin"

[dev]
  port = 3000
  targetPort = 3000
  publish = "dist"
  autoLaunch = "true"