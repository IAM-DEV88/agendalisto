[build]
  command = "pnpm run netlify-build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.14.0"
  CI = "false"
  COREPACK_INTEGRITY_KEYS = "0"
  SITE_URL = "https://agendaya.netlify.app"


[functions]
  directory = "netlify/functions"
  # esbuild bundler por defecto
  node_bundler = "esbuild"

# 404 personalizada — devuelve 404 real para crawlers
[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404

# Redirecciones para SPA (catch-all al final)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Seguridad básica
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.wompi.co https://plausible.io https://www.googletagmanager.com https://*.netlify.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.groq.com https://plausible.io https://*.netlify.app; frame-src https://www.googletagmanager.com;"

[dev]
  port = 3000
  targetPort = 3000
  publish = "dist"
  autoLaunch = "true"

