[build]
  command = "pnpm install --frozen-lockfile && pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.18.0"
  # pnpm no necesita --legacy-peer-deps
  CI = "false"
  COREPACK_INTEGRITY_KEYS = "0"
  SITE_URL = "https://agendalisto.com"

[functions]
  directory = "netlify/functions"
  # Node.js 20 + esbuild bundler por defecto
  node_bundler = "esbuild"

# 404 personalizada
[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 200

# Redirecciones para SPA (catch-all al final)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Seguridad básica
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "same-origin"

[dev]
  port = 3000
  targetPort = 3000
  publish = "dist"
  autoLaunch = "true"